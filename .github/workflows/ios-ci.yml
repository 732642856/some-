name: iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show versions
        run: |
          set -euo pipefail
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Resolve simulator destination
        id: simulator
        run: |
          set -euo pipefail
          xcrun simctl list devices available
          xcodebuild -project some.xcodeproj -scheme some -showdestinations
          SIMULATOR_NAME="$(
            xcrun simctl list devices available \
              | awk -F '[()]' '/^[[:space:]]*iPhone/ { name=$1; sub(/^[[:space:]]+/, "", name); sub(/[[:space:]]+$/, "", name); print name; exit }'
          )"
          if [ -z "$SIMULATOR_NAME" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi
          DESTINATION="platform=iOS Simulator,name=${SIMULATOR_NAME},OS=latest"
          echo "destination=${DESTINATION}" >> "$GITHUB_OUTPUT"
          echo "Using simulator destination: ${DESTINATION}"

      - name: Build for simulator
        run: |
          set -euo pipefail
          DESTINATION="${{ steps.simulator.outputs.destination }}"
          LOG_PATH="${RUNNER_TEMP}/xcodebuild-build.log"
          set +e
          xcodebuild \
            -project some.xcodeproj \
            -scheme some \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            clean build 2>&1 | tee "$LOG_PATH"
          BUILD_STATUS="${PIPESTATUS[0]}"
          set -e
          if [ "$BUILD_STATUS" -ne 0 ]; then
            tail -n 200 "$LOG_PATH"
            perl -ne '
              sub esc {
                my $value = shift;
                $value =~ s/%/%25/g;
                $value =~ s/\r/%0D/g;
                $value =~ s/\n/%0A/g;
                return $value;
              }
              if (/^(.*?):(\d+):(\d+): error: (.*)$/) {
                my ($file, $line, $column, $message) = ($1, $2, $3, $4);
                my $workspace = $ENV{"GITHUB_WORKSPACE"} || "";
                $file =~ s/^\Q$workspace\E\/// if $workspace ne "";
                print "::error file=" . esc($file) . ",line=$line,col=$column::" . esc($message) . "\n";
                $seen = 1;
              }
              END {
                print "::error::xcodebuild build failed; see the last 200 log lines above.\n" unless $seen;
              }
            ' "$LOG_PATH"
            exit "$BUILD_STATUS"
          fi

      - name: Run tests
        run: |
          set -euo pipefail
          DESTINATION="${{ steps.simulator.outputs.destination }}"
          LOG_PATH="${RUNNER_TEMP}/xcodebuild-test.log"
          set +e
          xcodebuild \
            -project some.xcodeproj \
            -scheme some \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            test 2>&1 | tee "$LOG_PATH"
          TEST_STATUS="${PIPESTATUS[0]}"
          set -e
          if [ "$TEST_STATUS" -ne 0 ]; then
            tail -n 200 "$LOG_PATH"
            perl -ne '
              sub esc {
                my $value = shift;
                $value =~ s/%/%25/g;
                $value =~ s/\r/%0D/g;
                $value =~ s/\n/%0A/g;
                return $value;
              }
              if (/^(.*?):(\d+):(\d+): error: (.*)$/) {
                my ($file, $line, $column, $message) = ($1, $2, $3, $4);
                my $workspace = $ENV{"GITHUB_WORKSPACE"} || "";
                $file =~ s/^\Q$workspace\E\/// if $workspace ne "";
                print "::error file=" . esc($file) . ",line=$line,col=$column::" . esc($message) . "\n";
                $seen = 1;
              }
              END {
                print "::error::xcodebuild test failed; see the last 200 log lines above.\n" unless $seen;
              }
            ' "$LOG_PATH"
            exit "$TEST_STATUS"
          fi
