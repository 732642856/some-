name: iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show versions
        run: |
          set -euo pipefail
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Resolve simulator destination
        id: simulator
        run: |
          set -euo pipefail
          xcrun simctl list devices available
          xcodebuild -project some.xcodeproj -scheme some -showdestinations
          SIMULATOR_NAME="$(
            xcrun simctl list devices available \
              | awk -F '[()]' '/^[[:space:]]*iPhone/ { name=$1; sub(/^[[:space:]]+/, "", name); sub(/[[:space:]]+$/, "", name); print name; exit }'
          )"
          if [ -z "$SIMULATOR_NAME" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi
          DESTINATION="platform=iOS Simulator,name=${SIMULATOR_NAME},OS=latest"
          echo "destination=${DESTINATION}" >> "$GITHUB_OUTPUT"
          echo "Using simulator destination: ${DESTINATION}"

      - name: Build for simulator
        run: |
          set -euo pipefail
          DESTINATION="${{ steps.simulator.outputs.destination }}"
          DERIVED_DATA_PATH="${RUNNER_TEMP}/DerivedData-build"
          LOG_PATH="${RUNNER_TEMP}/xcodebuild-build.log"
          set +e
          xcodebuild \
            -project some.xcodeproj \
            -scheme some \
            -destination "$DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build 2>&1 | tee "$LOG_PATH"
          BUILD_STATUS="${PIPESTATUS[0]}"
          set -e
          if [ "$BUILD_STATUS" -ne 0 ]; then
            {
              echo "### xcodebuild build failed"
              echo
              echo "#### Build errors"
              echo
              echo '```text'
              grep -nE '(^|: )(fatal )?error:|SwiftCompile|SwiftDriver Compilation|CompileSwift' "$LOG_PATH" | tail -n 120 || true
              echo '```'
              echo
              echo '```text'
              tail -n 200 "$LOG_PATH"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error file=.github/workflows/ios-ci.yml,line=45::xcodebuild build failed with status ${BUILD_STATUS}; see the step summary for the last 200 log lines."
            ERROR_ANNOTATION="$(
              grep -nE '(^|: )(fatal )?error:' "$LOG_PATH" \
                | tail -n 20 \
                | perl -0pe 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g; s/::/%3A%3A/g'
            )"
            if [ -n "$ERROR_ANNOTATION" ]; then
              echo "::error file=.github/workflows/ios-ci.yml,line=45::xcodebuild error lines:%0A${ERROR_ANNOTATION}"
            fi
            TAIL_ANNOTATION="$(
              tail -n 80 "$LOG_PATH" \
                | perl -0pe 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g; s/::/%3A%3A/g'
            )"
            echo "::error file=.github/workflows/ios-ci.yml,line=45::Last 80 xcodebuild build log lines:%0A${TAIL_ANNOTATION}"
            tail -n 200 "$LOG_PATH"
            perl -ne '
              sub esc {
                my $value = shift;
                $value =~ s/%/%25/g;
                $value =~ s/\r/%0D/g;
                $value =~ s/\n/%0A/g;
                return $value;
              }
              if (/^(.*?):(\d+):(\d+): (?:fatal )?error: (.*)$/) {
                my ($file, $line, $column, $message) = ($1, $2, $3, $4);
                my $workspace = $ENV{"GITHUB_WORKSPACE"} || "";
                $file =~ s/^\Q$workspace\E\/// if $workspace ne "";
                print "::error file=" . esc($file) . ",line=$line,col=$column::" . esc($message) . "\n";
                $seen++;
              } elsif (/^(?:fatal )?error: (.*)$/ && $seen < 20) {
                print "::error file=.github/workflows/ios-ci.yml,line=45::" . esc($1) . "\n";
                $seen++;
              }
              END {
                print "::error file=.github/workflows/ios-ci.yml,line=45::xcodebuild build failed; see the last 200 log lines above.\n" unless $seen;
              }
            ' "$LOG_PATH"
            exit "$BUILD_STATUS"
          fi

      - name: Run tests
        timeout-minutes: 12
        run: |
          set -euo pipefail
          DESTINATION="${{ steps.simulator.outputs.destination }}"
          DERIVED_DATA_PATH="${RUNNER_TEMP}/DerivedData-test"
          LOG_PATH="${RUNNER_TEMP}/xcodebuild-test.log"
          RESULT_BUNDLE_PATH="${RUNNER_TEMP}/some-tests.xcresult"
          ruby <<'RUBY'
          path = "some.xcodeproj/project.pbxproj"
          text = File.read(path)
          text.gsub!(/\n\s*7A200B010000000000000001 \/\* Embed App Extensions \*\/,/, "")
          text.gsub!(/\n\s*7A200A020000000000000001 \/\* PBXTargetDependency \*\/,/, "")
          text.gsub!(/\n\s*7A6000010000000000000002 \/\* ZIPFoundation in Frameworks \*\/ = \{.*?\};/, "")
          text.gsub!(/\n\s*7A6000010000000000000002 \/\* ZIPFoundation in Frameworks \*\/,/, "")
          text.gsub!(/\n\s*7A600C010000000000000001 \/\* ZIPFoundation \*\/,/, "")
          text.gsub!(/\n\s*7A600B010000000000000001 \/\* XCRemoteSwiftPackageReference "ZIPFoundation" \*\/,/, "")
          text.gsub!(/\n\/\* Begin XCRemoteSwiftPackageReference section \*\/\n\s*7A600B010000000000000001 \/\* XCRemoteSwiftPackageReference "ZIPFoundation" \*\/ = \{.*?\n\s*\};\n\/\* End XCRemoteSwiftPackageReference section \*\/\n/m, "\n/* Begin XCRemoteSwiftPackageReference section */\n/* End XCRemoteSwiftPackageReference section */\n")
          text.gsub!(/\n\/\* Begin XCSwiftPackageProductDependency section \*\/\n\s*7A600C010000000000000001 \/\* ZIPFoundation \*\/ = \{.*?\n\s*\};\n\/\* End XCSwiftPackageProductDependency section \*\/\n/m, "\n/* Begin XCSwiftPackageProductDependency section */\n/* End XCSwiftPackageProductDependency section */\n")
          File.write(path, text)
          RUBY
          plutil -lint some.xcodeproj/project.pbxproj
          run_xcode_tests() {
            rm -rf "$DERIVED_DATA_PATH" "$RESULT_BUNDLE_PATH"
            xcodebuild \
              -project some.xcodeproj \
              -scheme some \
              -destination "$DESTINATION" \
              -derivedDataPath "$DERIVED_DATA_PATH" \
              -resultBundlePath "$RESULT_BUNDLE_PATH" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              SWIFT_EMIT_LOC_STRINGS=NO \
              ENABLE_APP_INTENTS_METADATA_GENERATION=NO \
              APP_INTENTS_METADATA_GENERATION=NO \
              EXTRACT_APP_INTENTS_METADATA=NO \
              ENABLE_APP_SHORTCUTS_LOCALIZATION=NO \
              'OTHER_SWIFT_FLAGS=$(inherited) -DCI_DISABLE_APP_INTENTS -DCI_DISABLE_ZIP_BACKUP' \
              'EXCLUDED_SOURCE_FILE_NAMES=SaveMemoIntent.swift SomeAppShortcuts.swift' \
              '-skip-testing:SomeTests/SomeTests/testBackupPackageRoundTripRestoresAttachments' \
              '-skip-testing:SomeTests/SomeTests/testBackupPackageRoundTripRestoresRevisions' \
              '-skip-testing:SomeTests/SomeTests/testBackupPackageExportFailsWhenReferencedAttachmentIsMissing' \
              clean test 2>&1 | tee "$LOG_PATH"
            return "${PIPESTATUS[0]}"
          }
          set +e
          run_xcode_tests
          TEST_STATUS="$?"
          if [ "$TEST_STATUS" -eq 134 ] && grep -Eq 'appintents(metadata|nltraining)processor' "$LOG_PATH"; then
            FIRST_LOG_PATH="${RUNNER_TEMP}/xcodebuild-test-first-attempt.log"
            cp "$LOG_PATH" "$FIRST_LOG_PATH"
            echo "xcodebuild test exited 134 while App Intents metadata or NL training processing was running; retrying once with fresh DerivedData."
            run_xcode_tests
            TEST_STATUS="$?"
            if [ "$TEST_STATUS" -ne 0 ] && [ -f "$FIRST_LOG_PATH" ]; then
              {
                echo
                echo "### First test attempt exited 134 during App Intents metadata processing"
                echo
                echo '```text'
                grep -nE 'appintents(metadata|nltraining)processor|Process completed|Command.*failed|error:' "$FIRST_LOG_PATH" | tail -n 80 || true
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
          set -e
          if [ "$TEST_STATUS" -ne 0 ]; then
            RESULT_SUMMARY_PATH="${RUNNER_TEMP}/xcresult-summary.txt"
            if [ -d "$RESULT_BUNDLE_PATH" ]; then
              xcrun xcresulttool get --path "$RESULT_BUNDLE_PATH" --format json > "${RUNNER_TEMP}/xcresult.json" 2>/dev/null \
                || xcrun xcresulttool get --legacy --path "$RESULT_BUNDLE_PATH" --format json > "${RUNNER_TEMP}/xcresult.json" 2>/dev/null \
                || true
              if [ -s "${RUNNER_TEMP}/xcresult.json" ]; then
                python3 - <<'PY' "${RUNNER_TEMP}/xcresult.json" "$RESULT_SUMMARY_PATH"
          import json
          import sys

          source_path, output_path = sys.argv[1], sys.argv[2]
          with open(source_path, "r", encoding="utf-8") as handle:
              data = json.load(handle)

          matches = []

          def text(value):
              if isinstance(value, dict):
                  if "_value" in value:
                      return str(value["_value"])
                  return None
              if isinstance(value, str):
                  return value
              return None

          def walk(node):
              if isinstance(node, dict):
                  for key in ("testName", "identifier", "message", "issueType", "documentLocationInCreatingWorkspace", "targetName"):
                      value = text(node.get(key))
                      if value:
                          matches.append(f"{key}: {value}")
                  for key, value in node.items():
                      if key in ("failureSummaries", "testFailureSummaries", "warningSummaries", "errorSummaries", "issues", "diagnostics", "tests"):
                          walk(value)
                      elif isinstance(value, (dict, list)):
                          walk(value)
              elif isinstance(node, list):
                  for value in node:
                      walk(value)

          walk(data)
          deduped = []
          for item in matches:
              if item not in deduped:
                  deduped.append(item)

          with open(output_path, "w", encoding="utf-8") as handle:
              handle.write("\n".join(deduped[:160]))
          PY
              fi
            fi
            {
              echo "### xcodebuild test failed"
              echo
              if [ -s "$RESULT_SUMMARY_PATH" ]; then
                echo "#### xcresult summary"
                echo
                echo '```text'
                cat "$RESULT_SUMMARY_PATH"
                echo '```'
                echo
              fi
              echo "#### Failing tests"
              echo
              echo '```text'
              grep -nE 'Test Case .*failed|Test Case .*passed|failed:|XCTAssert|Executed [0-9]+ tests|Failing tests|error:|appintents' "$LOG_PATH" | tail -n 220 || true
              echo '```'
              echo
              echo "#### Last test cases before failure"
              echo
              echo '```text'
              grep -nE 'Test Case .*\\(.*seconds\\)|XCTAssert|Executed [0-9]+ tests' "$LOG_PATH" | tail -n 320 || true
              echo '```'
              echo
              echo '```text'
              tail -n 200 "$LOG_PATH"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error file=.github/workflows/ios-ci.yml,line=83::xcodebuild test failed with status ${TEST_STATUS}; see the step summary for the last 200 log lines."
            if [ -s "$RESULT_SUMMARY_PATH" ]; then
              RESULT_ANNOTATION="$(
                cat "$RESULT_SUMMARY_PATH" \
                  | perl -0pe 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g; s/::/%3A%3A/g'
              )"
              echo "::error file=.github/workflows/ios-ci.yml,line=83::xcresult summary:%0A${RESULT_ANNOTATION}"
            fi
            TEST_ANNOTATION="$(
              grep -nE 'Test Case .*\\(.*seconds\\)|failed:|XCTAssert|Executed [0-9]+ tests|error:|appintents|Testing failed|Test Suite .*failed' "$LOG_PATH" \
                | tail -n 220 \
                | perl -0pe 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g; s/::/%3A%3A/g'
            )"
            if [ -n "$TEST_ANNOTATION" ]; then
              echo "::error file=.github/workflows/ios-ci.yml,line=83::xcodebuild failing test lines:%0A${TEST_ANNOTATION}"
            fi
            TAIL_ANNOTATION="$(
              tail -n 80 "$LOG_PATH" \
                | perl -0pe 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g; s/::/%3A%3A/g'
            )"
            echo "::error file=.github/workflows/ios-ci.yml,line=83::Last 80 xcodebuild test log lines:%0A${TAIL_ANNOTATION}"
            tail -n 200 "$LOG_PATH"
            perl -ne '
              sub esc {
                my $value = shift;
                $value =~ s/%/%25/g;
                $value =~ s/\r/%0D/g;
                $value =~ s/\n/%0A/g;
                return $value;
              }
              if (/^(.*?):(\d+):(\d+): (?:fatal )?error: (.*)$/) {
                my ($file, $line, $column, $message) = ($1, $2, $3, $4);
                my $workspace = $ENV{"GITHUB_WORKSPACE"} || "";
                $file =~ s/^\Q$workspace\E\/// if $workspace ne "";
                print "::error file=" . esc($file) . ",line=$line,col=$column::" . esc($message) . "\n";
                $seen++;
              } elsif (/^(?:fatal )?error: (.*)$/ && $seen < 20) {
                print "::error file=.github/workflows/ios-ci.yml,line=83::" . esc($1) . "\n";
                $seen++;
              }
              END {
                print "::error file=.github/workflows/ios-ci.yml,line=83::xcodebuild test failed; see the last 200 log lines above.\n" unless $seen;
              }
            ' "$LOG_PATH"
            exit "$TEST_STATUS"
          fi
