name: iOS CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show versions
        run: |
          set -euo pipefail
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Resolve simulator destination
        id: simulator
        run: |
          set -euo pipefail
          xcrun simctl list devices available
          xcodebuild -project some.xcodeproj -scheme some -showdestinations
          SIMULATOR_NAME="$(
            xcrun simctl list devices available \
              | awk -F '[()]' '/^[[:space:]]*iPhone/ { name=$1; sub(/^[[:space:]]+/, "", name); sub(/[[:space:]]+$/, "", name); print name; exit }'
          )"
          if [ -z "$SIMULATOR_NAME" ]; then
            echo "No available iPhone simulator found."
            exit 1
          fi
          DESTINATION="platform=iOS Simulator,name=${SIMULATOR_NAME},OS=latest"
          echo "destination=${DESTINATION}" >> "$GITHUB_OUTPUT"
          echo "Using simulator destination: ${DESTINATION}"

      - name: Build for simulator
        run: |
          set -euo pipefail
          DESTINATION="${{ steps.simulator.outputs.destination }}"
          LOG_PATH="${RUNNER_TEMP}/xcodebuild-build.log"
          set +e
          xcodebuild \
            -project some.xcodeproj \
            -scheme some \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build 2>&1 | tee "$LOG_PATH"
          BUILD_STATUS="${PIPESTATUS[0]}"
          set -e
          if [ "$BUILD_STATUS" -ne 0 ]; then
            {
              echo "### xcodebuild build failed"
              echo
              echo "#### Build errors"
              echo
              echo '```text'
              grep -nE '(^|: )(fatal )?error:|SwiftCompile|SwiftDriver Compilation|CompileSwift' "$LOG_PATH" | tail -n 120 || true
              echo '```'
              echo
              echo '```text'
              tail -n 200 "$LOG_PATH"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error file=.github/workflows/ios-ci.yml,line=45::xcodebuild build failed with status ${BUILD_STATUS}; see the step summary for the last 200 log lines."
            ERROR_ANNOTATION="$(
              grep -nE '(^|: )(fatal )?error:' "$LOG_PATH" \
                | tail -n 20 \
                | perl -0pe 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g; s/::/%3A%3A/g'
            )"
            if [ -n "$ERROR_ANNOTATION" ]; then
              echo "::error file=.github/workflows/ios-ci.yml,line=45::xcodebuild error lines:%0A${ERROR_ANNOTATION}"
            fi
            TAIL_ANNOTATION="$(
              tail -n 80 "$LOG_PATH" \
                | perl -0pe 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g; s/::/%3A%3A/g'
            )"
            echo "::error file=.github/workflows/ios-ci.yml,line=45::Last 80 xcodebuild build log lines:%0A${TAIL_ANNOTATION}"
            tail -n 200 "$LOG_PATH"
            perl -ne '
              sub esc {
                my $value = shift;
                $value =~ s/%/%25/g;
                $value =~ s/\r/%0D/g;
                $value =~ s/\n/%0A/g;
                return $value;
              }
              if (/^(.*?):(\d+):(\d+): (?:fatal )?error: (.*)$/) {
                my ($file, $line, $column, $message) = ($1, $2, $3, $4);
                my $workspace = $ENV{"GITHUB_WORKSPACE"} || "";
                $file =~ s/^\Q$workspace\E\/// if $workspace ne "";
                print "::error file=" . esc($file) . ",line=$line,col=$column::" . esc($message) . "\n";
                $seen++;
              } elsif (/^(?:fatal )?error: (.*)$/ && $seen < 20) {
                print "::error file=.github/workflows/ios-ci.yml,line=45::" . esc($1) . "\n";
                $seen++;
              }
              END {
                print "::error file=.github/workflows/ios-ci.yml,line=45::xcodebuild build failed; see the last 200 log lines above.\n" unless $seen;
              }
            ' "$LOG_PATH"
            exit "$BUILD_STATUS"
          fi

      - name: Run tests
        run: |
          set -euo pipefail
          DESTINATION="${{ steps.simulator.outputs.destination }}"
          LOG_PATH="${RUNNER_TEMP}/xcodebuild-test.log"
          set +e
          xcodebuild \
            -project some.xcodeproj \
            -scheme some \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            test 2>&1 | tee "$LOG_PATH"
          TEST_STATUS="${PIPESTATUS[0]}"
          set -e
          if [ "$TEST_STATUS" -ne 0 ]; then
            {
              echo "### xcodebuild test failed"
              echo
              echo '```text'
              tail -n 200 "$LOG_PATH"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error file=.github/workflows/ios-ci.yml,line=83::xcodebuild test failed with status ${TEST_STATUS}; see the step summary for the last 200 log lines."
            TAIL_ANNOTATION="$(
              tail -n 80 "$LOG_PATH" \
                | perl -0pe 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g; s/::/%3A%3A/g'
            )"
            echo "::error file=.github/workflows/ios-ci.yml,line=83::Last 80 xcodebuild test log lines:%0A${TAIL_ANNOTATION}"
            tail -n 200 "$LOG_PATH"
            perl -ne '
              sub esc {
                my $value = shift;
                $value =~ s/%/%25/g;
                $value =~ s/\r/%0D/g;
                $value =~ s/\n/%0A/g;
                return $value;
              }
              if (/^(.*?):(\d+):(\d+): (?:fatal )?error: (.*)$/) {
                my ($file, $line, $column, $message) = ($1, $2, $3, $4);
                my $workspace = $ENV{"GITHUB_WORKSPACE"} || "";
                $file =~ s/^\Q$workspace\E\/// if $workspace ne "";
                print "::error file=" . esc($file) . ",line=$line,col=$column::" . esc($message) . "\n";
                $seen++;
              } elsif (/^(?:fatal )?error: (.*)$/ && $seen < 20) {
                print "::error file=.github/workflows/ios-ci.yml,line=83::" . esc($1) . "\n";
                $seen++;
              }
              END {
                print "::error file=.github/workflows/ios-ci.yml,line=83::xcodebuild test failed; see the last 200 log lines above.\n" unless $seen;
              }
            ' "$LOG_PATH"
            exit "$TEST_STATUS"
          fi
