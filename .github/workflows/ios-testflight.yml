name: iOS TestFlight

on:
  workflow_dispatch:

jobs:
  archive-and-upload:
    name: Archive and upload
    runs-on: macos-15
    env:
      SCHEME: some
      PROJECT: some.xcodeproj

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_SIGNING_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          : "${BUILD_CERTIFICATE_BASE64:?Missing IOS_DISTRIBUTION_CERTIFICATE_BASE64 secret}"
          : "${P12_PASSWORD:?Missing IOS_DISTRIBUTION_CERTIFICATE_PASSWORD secret}"
          : "${KEYCHAIN_PASSWORD:?Missing IOS_SIGNING_KEYCHAIN_PASSWORD secret}"
          CERTIFICATE_PATH="${RUNNER_TEMP}/ios_distribution.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"
          printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          APP_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_APP_STORE_PROVISIONING_PROFILE_BASE64 }}
          SHARE_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_SHARE_EXTENSION_APP_STORE_PROVISIONING_PROFILE_BASE64 }}
          WIDGET_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_WIDGET_EXTENSION_APP_STORE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          : "${APP_PROVISIONING_PROFILE_BASE64:?Missing IOS_APP_STORE_PROVISIONING_PROFILE_BASE64 secret}"
          : "${SHARE_EXTENSION_PROVISIONING_PROFILE_BASE64:?Missing IOS_SHARE_EXTENSION_APP_STORE_PROVISIONING_PROFILE_BASE64 secret}"
          : "${WIDGET_EXTENSION_PROVISIONING_PROFILE_BASE64:?Missing IOS_WIDGET_EXTENSION_APP_STORE_PROVISIONING_PROFILE_BASE64 secret}"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          APP_PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/some-app-store.mobileprovision"
          SHARE_EXTENSION_PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/some-share-extension-app-store.mobileprovision"
          WIDGET_EXTENSION_PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/some-widget-extension-app-store.mobileprovision"
          printf '%s' "$APP_PROVISIONING_PROFILE_BASE64" | base64 -D > "$APP_PROFILE_PATH"
          printf '%s' "$SHARE_EXTENSION_PROVISIONING_PROFILE_BASE64" | base64 -D > "$SHARE_EXTENSION_PROFILE_PATH"
          printf '%s' "$WIDGET_EXTENSION_PROVISIONING_PROFILE_BASE64" | base64 -D > "$WIDGET_EXTENSION_PROFILE_PATH"

      - name: Write export options
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}
          SHARE_EXTENSION_BUNDLE_ID: ${{ secrets.SHARE_EXTENSION_BUNDLE_ID }}
          WIDGET_EXTENSION_BUNDLE_ID: ${{ secrets.WIDGET_EXTENSION_BUNDLE_ID }}
          APP_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_APP_STORE_PROVISIONING_PROFILE_NAME }}
          SHARE_EXTENSION_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_SHARE_EXTENSION_APP_STORE_PROVISIONING_PROFILE_NAME }}
          WIDGET_EXTENSION_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_WIDGET_EXTENSION_APP_STORE_PROVISIONING_PROFILE_NAME }}
        run: |
          set -euo pipefail
          : "${APPLE_TEAM_ID:?Missing APPLE_TEAM_ID secret}"
          : "${APP_BUNDLE_ID:?Missing APP_BUNDLE_ID secret}"
          : "${APP_PROVISIONING_PROFILE_NAME:?Missing IOS_APP_STORE_PROVISIONING_PROFILE_NAME secret}"
          : "${SHARE_EXTENSION_PROVISIONING_PROFILE_NAME:?Missing IOS_SHARE_EXTENSION_APP_STORE_PROVISIONING_PROFILE_NAME secret}"
          : "${WIDGET_EXTENSION_PROVISIONING_PROFILE_NAME:?Missing IOS_WIDGET_EXTENSION_APP_STORE_PROVISIONING_PROFILE_NAME secret}"
          SHARE_EXTENSION_BUNDLE_ID="${SHARE_EXTENSION_BUNDLE_ID:-${APP_BUNDLE_ID}.share}"
          WIDGET_EXTENSION_BUNDLE_ID="${WIDGET_EXTENSION_BUNDLE_ID:-${APP_BUNDLE_ID}.widget}"
          cat > "${RUNNER_TEMP}/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key>
              <string>${APP_PROVISIONING_PROFILE_NAME}</string>
              <key>${SHARE_EXTENSION_BUNDLE_ID}</key>
              <string>${SHARE_EXTENSION_PROVISIONING_PROFILE_NAME}</string>
              <key>${WIDGET_EXTENSION_BUNDLE_ID}</key>
              <string>${WIDGET_EXTENSION_PROVISIONING_PROFILE_NAME}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Archive
        env:
          APP_BUNDLE_ID: ${{ secrets.APP_BUNDLE_ID }}
          SHARE_EXTENSION_BUNDLE_ID: ${{ secrets.SHARE_EXTENSION_BUNDLE_ID }}
          WIDGET_EXTENSION_BUNDLE_ID: ${{ secrets.WIDGET_EXTENSION_BUNDLE_ID }}
          APP_GROUP_IDENTIFIER: ${{ secrets.APP_GROUP_IDENTIFIER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_APP_STORE_PROVISIONING_PROFILE_NAME }}
          SHARE_EXTENSION_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_SHARE_EXTENSION_APP_STORE_PROVISIONING_PROFILE_NAME }}
          WIDGET_EXTENSION_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_WIDGET_EXTENSION_APP_STORE_PROVISIONING_PROFILE_NAME }}
        run: |
          set -euo pipefail
          : "${APPLE_TEAM_ID:?Missing APPLE_TEAM_ID secret}"
          : "${APP_BUNDLE_ID:?Missing APP_BUNDLE_ID secret}"
          : "${APP_GROUP_IDENTIFIER:?Missing APP_GROUP_IDENTIFIER secret}"
          : "${APP_PROVISIONING_PROFILE_NAME:?Missing IOS_APP_STORE_PROVISIONING_PROFILE_NAME secret}"
          : "${SHARE_EXTENSION_PROVISIONING_PROFILE_NAME:?Missing IOS_SHARE_EXTENSION_APP_STORE_PROVISIONING_PROFILE_NAME secret}"
          : "${WIDGET_EXTENSION_PROVISIONING_PROFILE_NAME:?Missing IOS_WIDGET_EXTENSION_APP_STORE_PROVISIONING_PROFILE_NAME secret}"
          SHARE_EXTENSION_BUNDLE_ID="${SHARE_EXTENSION_BUNDLE_ID:-${APP_BUNDLE_ID}.share}"
          WIDGET_EXTENSION_BUNDLE_ID="${WIDGET_EXTENSION_BUNDLE_ID:-${APP_BUNDLE_ID}.widget}"
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS' \
            -archivePath "${RUNNER_TEMP}/some.xcarchive" \
            APP_BUNDLE_ID="$APP_BUNDLE_ID" \
            SHARE_EXTENSION_BUNDLE_ID="$SHARE_EXTENSION_BUNDLE_ID" \
            WIDGET_EXTENSION_BUNDLE_ID="$WIDGET_EXTENSION_BUNDLE_ID" \
            APP_GROUP_IDENTIFIER="$APP_GROUP_IDENTIFIER" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            APP_PROVISIONING_PROFILE_SPECIFIER="$APP_PROVISIONING_PROFILE_NAME" \
            SHARE_EXTENSION_PROVISIONING_PROFILE_SPECIFIER="$SHARE_EXTENSION_PROVISIONING_PROFILE_NAME" \
            WIDGET_EXTENSION_PROVISIONING_PROFILE_SPECIFIER="$WIDGET_EXTENSION_PROVISIONING_PROFILE_NAME" \
            clean archive

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "${RUNNER_TEMP}/some.xcarchive" \
            -exportOptionsPlist "${RUNNER_TEMP}/ExportOptions.plist" \
            -exportPath "${RUNNER_TEMP}/export"

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_PRIVATE_KEY_BASE64: ${{ secrets.ASC_API_PRIVATE_KEY_BASE64 }}
        run: |
          set -euo pipefail
          : "${ASC_API_KEY_ID:?Missing ASC_API_KEY_ID secret}"
          : "${ASC_API_ISSUER_ID:?Missing ASC_API_ISSUER_ID secret}"
          : "${ASC_API_PRIVATE_KEY_BASE64:?Missing ASC_API_PRIVATE_KEY_BASE64 secret}"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$ASC_API_PRIVATE_KEY_BASE64" | base64 -D > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"
          echo "ASC API key installed for issuer ${ASC_API_ISSUER_ID}"

      - name: Upload to TestFlight
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          : "${ASC_API_KEY_ID:?Missing ASC_API_KEY_ID secret}"
          : "${ASC_API_ISSUER_ID:?Missing ASC_API_ISSUER_ID secret}"
          IPA_PATH="$(find "${RUNNER_TEMP}/export" -name '*.ipa' -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in ${RUNNER_TEMP}/export"
            exit 1
          fi
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID"
